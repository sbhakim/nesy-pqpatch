# Ground truth for Tier-2 reference app #4 (telemetry-signer).
# Consumed by tests/integration/test_tier2_telemetry.py and eval/detection.py
# to compute detector precision/recall (RQ0).
#
# Line numbers were confirmed against a REAL detector run, not hand-counted
# (the sites.yaml lesson from app #1, docs/STATUS.md bug #6). Notably, this
# app's FIRST draft hid its hard site behind a static final String constant
# and the detector CAUGHT it -- Semgrep constant-folds simple constants, as
# our own perturbation probe (eval/perturb.py) established. The shipped miss
# mechanism (#4) is ARRAY-INDEX INDIRECTION, which the same probe shows
# genuinely evades the pack: the algorithm is chosen from a compatibility
# table by a runtime index.

app: telemetry-signer
file: src/sealing/SealOps.java

sites:
  - line: 33
    usage_class: sign           # KeyPairGenerator("EC") P-384; no agreement in window
    detectable: true

  - line: 40
    usage_class: sign           # Signature("SHA512withECDSA") + initSign
    detectable: true

  - line: 48
    usage_class: verify         # Signature("NONEwithECDSA") raw-digest verify
    detectable: true

  - line: 57
    usage_class: sign           # true class if it were detectable; algorithm comes
    detectable: false           # from FLEET_SEAL_ALGS[protocolVersion] -- array-index
    note: table-indexed algorithm selection; expected detector miss (mechanism 4)

  - line: 65
    usage_class: kem            # KeyPairGenerator("DiffieHellman") feeding the DH
    detectable: true            # agreement within the classifier's forward window

  - line: 71
    usage_class: kem            # KeyAgreement("DH") -- unambiguous KEM
    detectable: true

  - line: 79
    usage_class: envelope       # Cipher("RSA/ECB/OAEPWithSHA-256AndMGF1Padding") wrap
    detectable: true

counts:
  total_sites: 7
  detectable: 6
  expected_miss: 1
