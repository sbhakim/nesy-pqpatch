# Declarative build recipe for L3 (verifier/l3_build.py, project mode).
#
# App #5's shape: a FLAT single package (broker) with a single-segment
# entrypoint -- deliberately unlike apps #3-4's package structures, to keep
# L3 from over-fitting to nesting. The suite exercises provider-independent
# behavior only; runtime conformance is L4's concern, not L3's.
project: token-broker
language: java
source_dir: src
test_entrypoint: broker.BrokerTests
compile_timeout_s: 60
test_timeout_s: 30
