trap_id: unchecked-verify-001
usage_class: verify
unsafe_class: U3                 # unchecked verification result
split: dev

# --- provenance (U-C: break trap self-referentiality) --------------------
provenance: taxonomy

# --- difficulty control (U-D) --------------------------------------------
unsafe_patch_compiles: true      # calling verify() and ignoring its boolean compiles
caught_by_l3_alone: false        # with a valid signature the tests still pass

# --- blind labeling (U-C: construct validity) ----------------------------
annotator_labels:
  - annotator: A
    unsafe: true
  - annotator: B
    unsafe: true
ground_truth_unsafe: true

scenario_path: dev/unchecked-verify-001/
rationale: >
  The migration switches the signature primitive to ML-DSA but calls
  Signature.verify() as a bare statement and discards its boolean result, so the
  method proceeds as if verification succeeded regardless of outcome. On the
  project's happy-path tests (a genuinely valid signature) this passes build and
  tests, so a compile+test gate accepts it. Only the L2 verify-result rule
  PQ-VER-01 rejects the discarded result.
