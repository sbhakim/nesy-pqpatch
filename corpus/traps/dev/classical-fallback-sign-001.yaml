trap_id: classical-fallback-sign-001
usage_class: sign
unsafe_class: U2                 # classical fallback: a reachable legacy path survives
split: dev

# --- provenance (U-C: break trap self-referentiality) --------------------
provenance: taxonomy

# --- difficulty control (U-D) --------------------------------------------
unsafe_patch_compiles: true      # migrating only the primary compiles cleanly
caught_by_l3_alone: false        # the happy path never enters the catch, tests pass

# --- blind labeling (U-C: construct validity) ----------------------------
annotator_labels:
  - annotator: A
    unsafe: true
  - annotator: B
    unsafe: true
ground_truth_unsafe: true

scenario_path: dev/classical-fallback-sign-001/
rationale: >
  The scenario's signing method already has a fallback shape: try the preferred
  algorithm, and on any provider failure retry with a legacy RSA signature. The
  plausible migration swaps the primary to ML-DSA-65 and leaves the catch-block
  fallback in place, so any runtime hiccup silently downgrades every signature
  to classical RSA. The happy path never enters the catch, so build and tests
  pass and a compile+test gate accepts it. The fallback rules reject it:
  PQ-FALL-01 (a catch block in migrated scope reaching a classical primitive)
  and PQ-FALL-04 (getInstance inside a catch is downgrade-on-failure).
